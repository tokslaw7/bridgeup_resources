services:
  db:
    image: postgres:16-alpine
    container_name: bridgeup-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bridgeup
      POSTGRES_PASSWORD: bridgeup
      POSTGRES_DB: bridgeup
    ports:
      # Host 5440 -> container 5432 (5440 chosen to avoid clashing with local Postgres)
      - "5440:5432"
    volumes:
      - bridgeup_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridgeup -d bridgeup"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bridgeup_pgdata:
